version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: app-tracker-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apptracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apptracker123}
      POSTGRES_DB: ${POSTGRES_DB:-apptracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U apptracker" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    image: python:3.11-slim
    container_name: app-tracker-backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apptracker}:${POSTGRES_PASSWORD:-apptracker123}@postgres:5432/${POSTGRES_DB:-apptracker}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      bash -c "apt-get update && apt-get install -y gcc postgresql-client &&
               pip install --no-cache-dir -r requirements.txt &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: app-tracker-frontend
    working_dir: /app
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
